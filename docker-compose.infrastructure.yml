services:
  postgres:
    image: postgres:16
    container_name: gigastudy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gigastudy
      POSTGRES_USER: gigastudy
      POSTGRES_PASSWORD: gigastudy
    ports:
      - "5432:5432"
    volumes:
      - gigastudy_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigastudy -d gigastudy"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:latest
    container_name: gigastudy-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - gigastudy_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio-create-bucket:
    image: minio/mc:latest
    container_name: gigastudy-minio-create-bucket
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/gigastudy
      "

volumes:
  gigastudy_postgres_data:
  gigastudy_minio_data:
