services:
  postgres:
    image: postgres:16
    container_name: gigastudy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gigastudy
      POSTGRES_USER: gigastudy
      POSTGRES_PASSWORD: gigastudy
    ports:
      - "5432:5432"
    volumes:
      - gigastudy_postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: gigastudy-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - gigastudy_minio_data:/data

volumes:
  gigastudy_postgres_data:
  gigastudy_minio_data:
