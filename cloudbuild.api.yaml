steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - ${_IMAGE}
      - .

images:
  - ${_IMAGE}

substitutions:
  _IMAGE: asia-northeast3-docker.pkg.dev/gigastudy-alpha-493208/gigastudy-alpha/gigastudy-api:latest

options:
  logging: CLOUD_LOGGING_ONLY
